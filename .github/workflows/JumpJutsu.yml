 name: github-actions-JumpJustsu-SQA2026

 on:
   push:
   pull_request:

 jobs:
   vv-check-SQA:
     runs-on: ubuntu-latest

     steps:
       - uses: actions/checkout@v3

       - name: Set up Python
         uses: actions/setup-python@v4
         with:
           python-version: '3.10'

       - name: Check Requirements Generation
         run: python scripts/generate_requirements.py -i "Input CFR File/CFR-117.130.md" -o "outputs/requirements.json" -c "21 CFR 117.130"

       - name: Check Requirements Output
         run: |
           test -f outputs/requirements.json
           test -f outputs/expected_structure.json

       - name: Check Test Case Generation
         run: python scripts/generate_test_cases.py

       - name: Check Test Case Output
         run: |
           test -f outputs/test_cases.json

       - name: Run Verification
         run: python scripts/verify.py

       - name: Print Demo Message
         run: echo "Hello from GitHub Actions! I am modifying this file "

       - name: Run Validation
         run: python scripts/validate.py